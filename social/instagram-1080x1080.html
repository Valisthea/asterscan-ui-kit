<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AsterScan — Instagram Square 1080×1080 (empty)</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #2a2a2c; padding: 24px; font-family: 'DM Sans', system-ui, sans-serif; }
    .post {
      width: 1080px; height: 1080px;
      background:
        radial-gradient(circle at top center, rgba(244, 213, 177, 0.12), transparent 50%),
        linear-gradient(180deg, #0E0E0F 0%, #161618 100%);
      color: #F2F0EE;
      padding: 90px 80px;
      display: flex; flex-direction: column; justify-content: space-between;
      position: relative; overflow: hidden;
      border-radius: 16px;
    }
    .brand { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .brand .mark { width: 96px; height: 96px; background: linear-gradient(135deg, #F4D5B1, #FFD29F); border-radius: 22px; display: grid; place-items: center; color: #0E0E0F; font-weight: 800; font-size: 50px; box-shadow: 0 0 90px rgba(244, 213, 177, 0.30); }
    .brand .name { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; }
    .brand .meta { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #7A7770; letter-spacing: 0.20em; text-transform: uppercase; }

    .placeholder-h { font-size: 88px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.0; color: #3A3A3F; text-align: center; }

    .footer { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .url { font-family: 'JetBrains Mono', monospace; font-size: 22px; opacity: 0.85; }
    .by  { font-size: 13px; color: #7A7770; letter-spacing: 0.2em; text-transform: uppercase; }
  
    /* Brand wordmark — matches the live navbar: JetBrains Mono with
       ASTER bold/primary + SCAN regular/muted/opacity-70 + tracking-widest. */
    .wordmark { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; display: inline-flex; align-items: baseline; gap: 1px; }
    .wordmark .aster { font-weight: 700; color: #F4D5B1; }
    .wordmark .scan  { font-weight: 400; color: #B9B5B0; opacity: 0.7; }

  </style>
</head>
<body>

<div class="post">
  <div class="brand">
    <div class="mark">✱</div>
    <div class="name"><span class="wordmark"><span class="aster">ASTER</span><span class="scan">SCAN</span></span></div>
    <div class="meta">block explorer · Aster Chain</div>
  </div>

  <div class="placeholder-h">Headline.</div>

  <div class="footer">
    <div class="url">aster-scan.com</div>
    <div class="by">Built by Kairos Lab</div>
  </div>
</div>

</body>
</html>
