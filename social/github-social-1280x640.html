<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AsterScan — GitHub Social 1280×640</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #2a2a2c; padding: 24px; font-family: 'DM Sans', system-ui, sans-serif; }
    .gh {
      width: 1280px; height: 640px;
      background:
        radial-gradient(ellipse at top right, rgba(244, 213, 177, 0.10), transparent 55%),
        linear-gradient(180deg, #0E0E0F 0%, #161618 100%);
      color: #F2F0EE;
      padding: 80px;
      display: flex; flex-direction: column; justify-content: space-between;
      position: relative; overflow: hidden;
      border-radius: 16px;
    }
    .gh::after { content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 6px; background: linear-gradient(180deg, #F4D5B1, #FFD29F); }
    .head { display: flex; align-items: center; gap: 18px; }
    .head .mark { width: 72px; height: 72px; background: linear-gradient(135deg, #F4D5B1, #FFD29F); border-radius: 18px; display: grid; place-items: center; color: #0E0E0F; font-weight: 800; font-size: 36px; }
    .head .name { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; }
    .head .meta { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #7A7770; letter-spacing: 0.18em; text-transform: uppercase; margin-top: 4px; }

    .repo-line { font-family: 'JetBrains Mono', monospace; font-size: 22px; color: #B9B5B0; }
    .repo-line .org { color: #7A7770; }
    .repo-line .name { color: #F4D5B1; }

    .desc { font-size: 32px; line-height: 1.3; max-width: 1000px; color: #F2F0EE; }
    .desc strong { color: #F4D5B1; }

    .footer { display: flex; gap: 32px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #7A7770; letter-spacing: 0.16em; text-transform: uppercase; }
  
    /* Brand wordmark — matches the live navbar: JetBrains Mono with
       ASTER bold/primary + SCAN regular/muted/opacity-70 + tracking-widest. */
    .wordmark { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; display: inline-flex; align-items: baseline; gap: 1px; }
    .wordmark .aster { font-weight: 700; color: #F4D5B1; }
    .wordmark .scan  { font-weight: 400; color: #B9B5B0; opacity: 0.7; }

  </style>
</head>
<body>

<div class="gh">
  <div class="head">
    <div class="mark">✱</div>
    <div>
      <div class="name"><span class="wordmark"><span class="aster">ASTER</span><span class="scan">SCAN</span></span></div>
      <div class="meta">Open-source-ish · TypeScript · Next.js</div>
    </div>
  </div>

  <div>
    <div class="repo-line"><span class="org">Valisthea/</span><span class="name">asterscan</span></div>
    <div class="desc" style="margin-top: 18px;">
      The independent <strong>Aster Chain</strong> block explorer. Real-time blocks, transactions, validators, and trader analytics. Built by <strong>Kairos Lab</strong>.
    </div>
  </div>

  <div class="footer">
    <span>aster-scan.com</span>
    <span>kairos-lab.org</span>
  </div>
</div>

</body>
</html>
