<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AsterScan — End Card 1920×1080</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #2a2a2c; padding: 24px; font-family: 'DM Sans', system-ui, sans-serif; }
    .frame {
      width: 1920px; height: 1080px;
      background:
        radial-gradient(circle at center, rgba(244, 213, 177, 0.10), transparent 50%),
        linear-gradient(180deg, #0E0E0F 0%, #161618 100%);
      color: #F2F0EE;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 40px;
      position: relative; overflow: hidden;
      border: 1px solid #26262A;
    }
    .mark {
      width: 160px; height: 160px;
      background: linear-gradient(135deg, #F4D5B1, #FFD29F);
      border-radius: 36px;
      display: grid; place-items: center;
      color: #0E0E0F; font-weight: 800; font-size: 84px;
      box-shadow: 0 0 200px rgba(244, 213, 177, 0.30);
    }
    .name { font-size: 88px; font-weight: 800; letter-spacing: -0.025em; }
    .url { font-family: 'JetBrains Mono', monospace; font-size: 36px; color: #F2F0EE; opacity: 0.85; margin-top: -10px; }
    .by  { font-family: 'JetBrains Mono', monospace; font-size: 16px; color: #7A7770; letter-spacing: 0.22em; text-transform: uppercase; margin-top: 12px; }

    .accent-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: linear-gradient(90deg, transparent, #F4D5B1, #FFD29F, transparent); }
  
    /* Brand wordmark — matches the live navbar: JetBrains Mono with
       ASTER bold/primary + SCAN regular/muted/opacity-70 + tracking-widest. */
    .wordmark { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; display: inline-flex; align-items: baseline; gap: 1px; }
    .wordmark .aster { font-weight: 700; color: #F4D5B1; }
    .wordmark .scan  { font-weight: 400; color: #B9B5B0; opacity: 0.7; }

  </style>
</head>
<body>

<div class="frame">
  <div class="mark">✱</div>
  <div class="name"><span class="wordmark"><span class="aster">ASTER</span><span class="scan">SCAN</span></span></div>
  <div class="url">aster-scan.com</div>
  <div class="by">Built by Kairos Lab</div>
  <div class="accent-line"></div>
</div>

</body>
</html>
